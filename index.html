<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List App - JavaScript</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
</head>
<body>
    <main>
        <div class="wrap">
            <section class="heading">
                <p class="title">Engineer Sheraz Ali</p>
                <p class="subtitle">Manage And Search Your Pending Tasks In Clicks!</p>
            </section>

            <section class="task-manager">
                <div class="search-box">
                    <form action="" class="search">
                        <input type="text" name="task" placeholder="Search Task" autocomplete="off">
                        <i class="bi bi-x-circle reset"></i>
                    </form>
                </div>
                <div class="task-box">
                    <ul class="task">
                        <!-- <li>
                            <span>VD Recording</span>
                            <i class="bi bi-trash-fill delete"></i>
                        </li>
                        <li>
                            <span>Editing</span>
                            <i class="bi bi-trash-fill delete"></i>
                        </li>
                        <li>
                            <span>AD Recording</span>
                            <i class="bi bi-trash-fill delete"></i>
                        </li> -->
                    </ul>
                    <form action="" class="add">
                        <input type="text" name="task" placeholder="add task" autocomplete="off">
                        <input type="submit" value="Add">
                    </form>
                </div>
                <div class="message">
                    <span></span>
                    <button class="clear">Clear All</button>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
